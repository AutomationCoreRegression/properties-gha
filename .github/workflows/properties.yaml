name: Property Verification Workflow

on:
  workflow_dispatch:

env:
  properties:
    TEST_ENV_VALUE:
      type: string
      value: test_value

    FEATURE_FLAG:
      type: boolean
      value: true

    RETRY_COUNT:
      type: number
      value: 3

jobs:
  test-properties:
    runs-on: ubuntu-latest

    steps:
      - name: Extract and export properties
        run: |
          echo "TEST_ENV_VALUE=${{ env.properties.TEST_ENV_VALUE.value }}" >> $GITHUB_ENV
          echo "FEATURE_FLAG=${{ env.properties.FEATURE_FLAG.value }}" >> $GITHUB_ENV
          echo "RETRY_COUNT=${{ env.properties.RETRY_COUNT.value }}" >> $GITHUB_ENV

      - name: Validate properties
        run: |
          echo "String Value: $TEST_ENV_VALUE"
          echo "Boolean Value: $FEATURE_FLAG"
          echo "Number Value: $RETRY_COUNT"

          # String validation
          [ "$TEST_ENV_VALUE" = "test_value" ] && echo "String OK" || exit 1

          # Boolean validation
          if [ "$FEATURE_FLAG" = "true" ] || [ "$FEATURE_FLAG" = "false" ]; then
            echo "Boolean OK"
          else
            exit 1
          fi

          # Number validation
          if [[ "$RETRY_COUNT" =~ ^[0-9]+$ ]]; then
            echo "Number OK"
          else
            exit 1
          fi
        

